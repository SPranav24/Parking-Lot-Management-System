{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 200px);">
  <div class="col-md-7 col-lg-5 col-xl-4">
    <div class="glass-card p-5">
      <div class="text-center mb-5">
        <div class="rounded-circle d-inline-block p-4 mb-4" style="background: rgba(168, 85, 247, 0.1); color: #a855f7;">
          <i class="fa-solid fa-door-open fs-1"></i>
        </div>
        <h2 class="fw-bold mb-1">Check-out</h2>
        <p class="text-white opacity-75">Process vehicle exit and billing</p>
      </div>

      <form method="POST">
        <div class="mb-5">
          <label class="form-label small fw-bold text-uppercase text-white opacity-75 px-1" style="letter-spacing: 0.1em;">Vehicle Registration Number</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px; border-color: var(--glass-border);"><i class="fa-solid fa-magnifying-glass text-white opacity-50"></i></span>
            <input type="text" class="form-control form-control-premium border-start-0" style="border-radius: 0 12px 12px 0;" name="vehicle_number" placeholder="Enter vehicle number" required autofocus>
          </div>
        </div>

        <div class="d-flex gap-3">
          <a href="/" class="btn btn-outline-premium flex-grow-1 py-3">Abort</a>
          <button type="submit" class="btn btn-premium flex-grow-1 py-3">Process Exit</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
