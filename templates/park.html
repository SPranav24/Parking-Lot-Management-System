{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 200px);">
  <div class="col-md-7 col-lg-5 col-xl-4">
    <div class="glass-card p-5">
      <div class="text-center mb-5">
        <div class="rounded-circle d-inline-block p-4 mb-4" style="background: rgba(99, 102, 241, 0.1); color: #818cf8;">
          <i class="fa-solid fa-car-side fs-1"></i>
        </div>
        <h2 class="fw-bold mb-1">Check-in Vehicle</h2>
        <p class="text-white opacity-75">Register a new parking session</p>
      </div>

      <form method="POST">
        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase text-white opacity-75 px-1" style="letter-spacing: 0.1em;">Vehicle Registration Number</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px; border-color: var(--glass-border);"><i class="fa-solid fa-hashtag text-white opacity-50"></i></span>
            <input type="text" class="form-control form-control-premium border-start-0" style="border-radius: 0 12px 12px 0;" name="vehicle_number" placeholder="e.g. KA01AB1234" required>
          </div>
        </div>
        
        <div class="mb-5">
          <label class="form-label small fw-bold text-uppercase text-white opacity-75 px-1" style="letter-spacing: 0.1em;">Vehicle Classification</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px; border-color: var(--glass-border);"><i class="fa-solid fa-tags text-white opacity-50"></i></span>
            <select name="vehicle_type" class="form-select form-control-premium border-start-0" style="border-radius: 0 12px 12px 0;">
              <option value="CAR">Premium Car</option>
              <option value="BIKE">Standard Bike</option>
            </select>
          </div>
        </div>

        <div class="d-flex gap-3">
          <a href="/" class="btn btn-outline-premium flex-grow-1 py-3">Cancel</a>
          <button type="submit" class="btn btn-premium flex-grow-1 py-3">Confirm Entry</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
